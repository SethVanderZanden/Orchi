name: Desktop Frontend

on:
  push:
    paths:
      - 'src/desktop/**'
      - '.github/workflows/desktop-frontend.yml'
  pull_request:
    paths:
      - 'src/desktop/**'

defaults:
  run:
    working-directory: src/desktop

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/desktop/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
        env:
          CI: true
