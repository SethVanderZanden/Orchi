name: Desktop Frontend

on:
  push:
    paths:
      - 'src/desktop/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/desktop-frontend.yml'
  pull_request:
    paths:
      - 'src/desktop/**'
      - 'package.json'
      - 'package-lock.json'

defaults:
  run:
    working-directory: src/desktop

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            src/desktop/package-lock.json
      - name: Audit root npm dependencies
        working-directory: .
        run: npm ci && npm audit --audit-level=high
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
        env:
          CI: true
